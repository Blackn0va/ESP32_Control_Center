name: Deploy to GitHub Pages

# Deployt die statische App (index.html) auf GitHub Pages.
# Firmware-Embeds (GPL) sind .gitignore't und daher NICHT im Deploy -> nur
# Online-Flash (Auto-Download) verfuegbar, kein GPL-Binary wird gehostet.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # Aktiviert Pages automatisch (Build-Typ: GitHub Actions), falls noch nicht eingerichtet
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
